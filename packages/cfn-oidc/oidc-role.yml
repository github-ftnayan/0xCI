AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Creates an IAM OIDC Identity Provider for GitHub Actions (or reuses an existing one)
  and an IAM Role that GitHub Actions workflows can assume via OIDC (no long-lived keys).

Parameters:
  GitHubOrg:
    Type: String
    Description: Your GitHub username or organization name
  GitHubRepo:
    Type: String
    Default: "*"
    Description: Repository name to scope trust to (use * for all repos in the org)
  RoleName:
    Type: String
    Default: 0xci-deploy-role
    Description: Name of the IAM Role to create

Resources:
  # Lambda execution role — minimal permissions to create/get OIDC provider
  OIDCFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OIDCProviderAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateOpenIDConnectProvider
                  - iam:GetOpenIDConnectProvider
                Resource: "*"

  # Lambda that creates the OIDC provider or returns the existing one
  OIDCProviderFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt OIDCFunctionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          ISSUER = "token.actions.githubusercontent.com"
          URL = f"https://{ISSUER}"

          def handler(event, context):
            iam = boto3.client("iam")
            account_id = context.invoked_function_arn.split(":")[4]
            arn = f"arn:aws:iam::{account_id}:oidc-provider/{ISSUER}"

            if event["RequestType"] == "Delete":
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              return

            try:
              iam.create_open_id_connect_provider(
                Url=URL,
                ClientIDList=["sts.amazonaws.com"],
                ThumbprintList=["1c58a3a8518e8759bf075b76b750d4f2df264fcd"],
              )
            except iam.exceptions.EntityAlreadyExistsException:
              pass  # Reuse the existing provider

            cfnresponse.send(event, context, cfnresponse.SUCCESS, {"Arn": arn}, arn)

  OIDCProvider:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt OIDCProviderFunction.Arn

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt OIDCProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                "token.actions.githubusercontent.com:sub":
                  !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudFrontFullAccess
        - arn:aws:iam::aws:policy/AWSLambda_FullAccess
        - arn:aws:iam::aws:policy/AmazonSSMFullAccess
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
      Policies:
        - PolicyName: SSTIAMPassRole
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:TagRole
                Resource: "*"

Outputs:
  RoleArn:
    Description: ARN of the created deploy role — injected automatically as AWS_ROLE_ARN.
    Value: !GetAtt DeployRole.Arn
