AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Creates an IAM OIDC Identity Provider for GitHub Actions and an IAM Role
  that GitHub Actions workflows can assume via OIDC (no long-lived keys).

Parameters:
  GitHubOrg:
    Type: String
    Description: Your GitHub username or organization name
  GitHubRepo:
    Type: String
    Default: "*"
    Description: Repository name to scope trust to (use * for all repos in the org)
  RoleName:
    Type: String
    Default: 0xci-deploy-role
    Description: Name of the IAM Role to create
  OIDCProviderArn:
    Type: String
    Default: ""
    Description: >
      ARN of an existing GitHub OIDC provider in this account. Leave blank to
      create one. AWS only allows one OIDC provider per issuer URL per account.

Conditions:
  CreateOIDCProvider: !Equals [!Ref OIDCProviderArn, ""]

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                "token.actions.githubusercontent.com:sub":
                  !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudFrontFullAccess
        - arn:aws:iam::aws:policy/AWSLambda_FullAccess
        - arn:aws:iam::aws:policy/AmazonSSMFullAccess
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
      Policies:
        - PolicyName: SSTIAMPassRole
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:TagRole
                Resource: "*"

Outputs:
  RoleArn:
    Description: >
      Copy this ARN and add it as AWS_ROLE_ARN in your GitHub repository secrets.
    Value: !GetAtt DeployRole.Arn
