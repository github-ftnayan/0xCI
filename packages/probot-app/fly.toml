app = "0xci-probot"
primary_region = "sin" # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"
  # Build context must be monorepo root — set via: fly deploy --dockerfile packages/probot-app/Dockerfile

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # Never sleep — must receive webhooks at any time
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
